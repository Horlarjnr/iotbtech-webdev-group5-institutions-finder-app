<!DOCTYPE html> 
<html lang="en"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Nigerian Institutions Finder</title> 
  <script src="https://cdn.tailwindcss.com"></script> 
  <style> 
    .loader { 
      border: 3px solid #f3f3f3; 
      border-top: 3px solid #10b981; 
      border-radius: 50%; 
      width: 40px; 
      height: 40px; 
      animation: spin 0.8s linear infinite; 
    } 
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } 
    .modal-overlay { background: rgba(0,0,0,0.5); } 
  </style> 
</head> 
<body class="bg-gray-50 min-h-screen flex flex-col"> 
 
  <header class="bg-green-700 text-white py-8 px-4 shadow-lg"> 
    <div class="max-w-6xl mx-auto text-center"> 
      <h1 class="text-3xl md:text-4xl font-bold">  Nigerian Institutions Finder</h1> 
      <p class="text-green-200 mt-2">200+ universities, polytechnics & colleges of education – 
verified websites</p> 
    </div> 
  </header> 
 
  <main class="flex-1 max-w-6xl mx-auto px-4 py-8 w-full"> 
    <div class="flex flex-col sm:flex-row gap-4 mb-8"> 
      <div class="relative flex-1"> 
        <input type="text" id="searchInput" placeholder="Search by institution name or state..." 
               class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-300 focus:outline-none 
focus:ring-2 focus:ring-green-500 transition"> 
        <svg class="absolute left-3 top-3.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" 
viewBox="0 0 24 24"> 
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 
21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/> 
        </svg> 
      </div> 
      <button id="favToggleBtn" class="px-6 py-3 bg-gray-200 text-gray-700 rounded-xl 
font-semibold hover:bg-gray-300 transition"> 
        ♥ Favourites 
      </button> 
    </div> 
 
    <div id="statusMessage" class="text-center py-8 hidden"></div> 
    <div id="institutionGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div> 
  </main> 
 
  <footer class="bg-white border-t py-4 text-center text-gray-500 text-sm"> 
    Data from <a href="https://universities.hipolabs.com" class="text-green-600 
underline">Hipolabs API</a> · built‑in fallback list 
  </footer> 
 
  <div id="detailModal" class="fixed inset-0 modal-overlay hidden z-50 flex items-center 
justify-center p-4"> 
    <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto"> 
      <div class="sticky top-0 bg-white p-4 border-b flex justify-between items-center"> 
        <h2 class="text-xl font-bold text-gray-800" id="modalTitle"></h2> 
        <button onclick="closeModal()" class="text-gray-500 hover:text-gray-800 text-2xl 
leading-none">&times;</button> 
      </div> 
      <div id="modalBody" class="p-6"></div> 
    </div> 
  </div> 
 
  <script src="index.js"></script> 
</body> 
</html>
